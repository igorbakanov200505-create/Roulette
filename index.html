<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Roulette</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="space">

<!-- ⚙️ НАСТРОЙКИ -->
<button class="settings-btn" onclick="openSettings()">⚙️</button>

<!-- 🟣 Twitch (слева снизу) -->
<a class="social twitch" href="https://www.twitch.tv/azraellonelive" target="_blank">
  <svg viewBox="0 0 24 24">
    <path d="M4 2h18v12l-4 4h-5l-3 3v-3H4V2zm2 2v10h4v3l3-3h5l3-3V4H6zm5 3h2v6h-2V7zm4 0h2v6h-2V7z"/>
  </svg>
</a>

<!-- 🔴 YouTube (справа снизу) -->
<a class="social youtube" href="https://www.youtube.com/@AzraelLone" target="_blank">
  <svg viewBox="0 0 24 24">
    <path d="M23 7s-.2-1.5-.8-2.2c-.8-.9-1.7-.9-2.1-1C17.2 3.5 12 3.5 12 3.5s-5.2 0-8.1.3c-.4.1-1.3.1-2.1 1C1.2 5.5 1 7 1 7S.8 8.8.8 10.6v1.7C.8 14.1 1 15.9 1 15.9s.2 1.5.8 2.2c.8.9 1.9.8 2.4.9 1.7.2 7.3.3 7.3.3s5.2 0 8.1-.3c.4-.1 1.3-.1 2.1-1 .6-.7.8-2.2.8-2.2s.2-1.8.2-3.6v-1.7C23.2 8.8 23 7 23 7zM10 14V8l6 3-6 3z"/>
  </svg>
</a>

<div class="title">РУЛЕТКА ИГР</div>

<button class="spin" onclick="spin()">SPIN</button>

<div class="main">
  <div class="pointer"></div>
  <div class="roulette" id="r"></div>
</div>

<div class="result" id="res"></div>

<!-- ⚙️ МЕНЮ -->
<div class="modal" id="modal">
  <div class="modal-box">

    <h2>⚙️ НАСТРОЙКИ</h2>

    <label>⏱ Время вращения</label>
    <input type="range" id="time" min="3" max="10" value="5">

    <label>🎨 Тема</label>
    <select id="themeSelect">
      <option value="space">Space</option>
      <option value="neon">Neon</option>
      <option value="dark">Dark</option>
    </select>

    <button onclick="applySettings()">Применить</button>
    <button onclick="closeSettings()">Закрыть</button>

  </div>
</div>

<audio id="sound" src="1.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
