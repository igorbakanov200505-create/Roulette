<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Roulette</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="space">

<!-- 🌐 соц -->
<a class="social twitch" href="https://www.twitch.tv/azraellonelive" target="_blank">T</a>
<a class="social youtube" href="https://www.youtube.com/@AzraelLone" target="_blank">Y</a>

<!-- ⚙️ настройки -->
<button class="settings-btn" onclick="openSettings()">⚙️</button>

<div class="title">РУЛЕТКА ИГР</div>

<div class="themes">
  <button onclick="setTheme('space')">Space</button>
  <button onclick="setTheme('neon')">Neon</button>
  <button onclick="setTheme('dark')">Dark</button>
</div>

<button class="spin" onclick="spin()">SPIN</button>

<div class="main">
  <div class="pointer"></div>
  <div class="roulette" id="r"></div>
</div>

<div class="result" id="res"></div>

<!-- ⚙️ MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <h2>⚙️ НАСТРОЙКИ</h2>

    <label>🎰 Скорость (сек)</label>
    <input type="range" min="2" max="8" step="0.5" id="speed">

    <label>⏱ Время вращения</label>
    <input type="range" min="2" max="10" step="1" id="time">

    <label>🎨 Тема</label>
    <select id="themeSelect">
      <option value="space">Space</option>
      <option value="neon">Neon</option>
      <option value="dark">Dark</option>
    </select>

    <button onclick="applySettings()">✔ Применить</button>
    <button onclick="closeSettings()">✖ Закрыть</button>

  </div>
</div>

<audio id="sound" src="1.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
