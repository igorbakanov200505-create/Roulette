<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"content="width=device-width,initial-scale=1.0">
<title>РУЛЕТКА</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
color:#fff;
background:#05010a;
}

/* BACKGROUND */
.bg{
position:absolute;
inset:0;
background:radial-gradient(circle at 30% 20%,#1a0033,#000);
}

/* TITLE */
.title{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
font-size:18px;
letter-spacing:4px;
opacity:.8;
}

/* SPIN */
.spin{
position:absolute;
top:50px;
left:50%;
transform:translateX(-50%);
padding:12px 36px;
border:none;
border-radius:12px;
background:#7c3aed;
color:#fff;
cursor:pointer;
font-size:16px;
transition:.2s;
}
.spin:hover{transform:translateX(-50%) scale(1.05);}

/* MAIN */
.main{
position:absolute;
left:50%;
top:55%;
transform:translate(-50%,-50%);
width:1500px;
height:240px;
border-radius:18px;
background:rgba(255,255,255,.03);
backdrop-filter:blur(14px);
overflow:hidden;
border:1px solid rgba(255,255,255,.08);
}

/* POINTER */
.pointer{
position:absolute;
left:50%;
top:0;
transform:translateX(-50%);
width:3px;
height:100%;
background:#ff00ff;
box-shadow:0 0 18px #ff00ff;
z-index:10;
}

/* ROULETTE */
.roulette{
display:flex;
gap:14px;
padding:40px;
will-change:transform;
transition:transform 4.2s cubic-bezier(.08,.9,.1,1);
}

.card{
min-width:320px;
height:150px;
border-radius:14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.1);
font-size:16px;
text-align:center;
}

/* RESULT */
.result{
position:absolute;
left:50%;
bottom:40px;
transform:translateX(-50%);
font-size:26px;
text-align:center;
opacity:0;
transition:.25s;
}

/* SOCIAL */
.social{
position:absolute;
bottom:15px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 18px;
}

.social a{
text-decoration:none;
color:#fff;
padding:10px 14px;
border-radius:10px;
background:rgba(0,0,0,.4);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(10px);
font-size:14px;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="title">РУЛЕТКА</div>

<button class="spin"onclick="spin()">SPIN</button>

<div class="main">
<div class="pointer"></div>
<div class="roulette"id="r"></div>
</div>

<div class="result"id="res"></div>

<div class="social">
<a href="https://www.twitch.tv/azraellonelive"target="_blank">TWITCH</a>
<a href="https://www.youtube.com/@AzraelLone"target="_blank">YOUTUBE</a>
</div>

<audio id="sound"src="1.mp3"></audio>

<script>

let games=[
{name:"Minecraft",rarity:"отличная"},
{name:"Elden Ring",rarity:"легендарная"},
{name:"GTA V",rarity:"отличная"},
{name:"Hello Neighbor",rarity:"обычная"},
{name:"Phasmophobia",rarity:"хорошая"},
{name:"Terraria",rarity:"отличная"},
{name:"The Forest",rarity:"хорошая"}
];

const r=document.getElementById("r");
const res=document.getElementById("res");
const sound=document.getElementById("sound");

let spinning=false;

/* RENDER */
function render(){

r.innerHTML="";
let pool=[];
for(let i=0;i<16;i++) pool.push(...games);

pool.forEach(g=>{
let el=document.createElement("div");
el.className="card";
el.innerHTML=`${g.name}<br>${g.rarity}`;
r.appendChild(el);
});

}

render();

/* WEIGHT PICK */
function pick(){
let pool=[];
games.forEach(g=>{
let w=1;
if(g.rarity==="обычная")w=6;
if(g.rarity==="хорошая")w=4;
if(g.rarity==="отличная")w=2;
if(g.rarity==="легендарная")w=0.6;

for(let i=0;i<w*10;i++)pool.push(g);
});
return pool[Math.floor(Math.random()*pool.length)];
}

/* SPIN FIXED */
function spin(){

if(spinning)return;
spinning=true;

res.style.opacity=0;

sound.currentTime=0;
sound.play();

/* reset */
r.style.transition="none";
r.style.transform="translateX(0px)";

setTimeout(()=>{

r.style.transition="transform 4.2s cubic-bezier(.08,.9,.1,1)";

let cards=[...document.querySelectorAll(".card")];

let chosen=pick();

let el=cards.find(c=>c.innerText.includes(chosen.name));
if(!el) el=cards[0];

/* EXACT CENTER FIX */
let offset=
el.getBoundingClientRect().left +
el.offsetWidth/2 -
window.innerWidth/2;

/* slight variation for realism */
offset += (Math.random()*60-30);

r.style.transform=`translateX(-${offset}px)`;

setTimeout(()=>{

res.innerHTML=`🎮 ${chosen.name}<br>${chosen.rarity}`;
res.style.opacity=1;

sound.pause();
sound.currentTime=0;

spinning=false;

},4200);

},40);

}

</script>

</body>
</html>
