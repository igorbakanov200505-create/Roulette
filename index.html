<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"content="width=device-width,initial-scale=1.0">
<title>РУЛЕТКА</title>
<link rel="stylesheet"href="style.css">
</head>

<body class="space">

<div class="title">РУЛЕТКА</div>

<button class="spin"onclick="spin()">SPIN</button>
<button class="settings"onclick="toggle()">⚙</button>

<div class="panel"id="panel">

<select onchange="setTheme(this.value)">
<option value="space">SPACE</option>
<option value="neon">NEON</option>
<option value="dark">DARK</option>
</select>

<!-- ⚡ СКОРОСТЬ -->
<label>Скорость</label>
<input id="speed"type="range"min="2"max="8"step="0.5"value="4.5">

<input id="name"placeholder="Игра">

<select id="rarity">
<option>обычная</option>
<option>хорошая</option>
<option>отличная</option>
<option>легендарная</option>
</select>

<button onclick="add()">Добавить</button>

</div>

<div class="main">
<div class="pointer"></div>
<div class="roulette"id="r"></div>
</div>

<div class="result"id="res"></div>

<audio id="sound"src="1.mp3"></audio>

<script>

let db=JSON.parse(localStorage.getItem("db"))||[];
let spinning=false;

const r=document.getElementById("r");
const res=document.getElementById("res");
const sound=document.getElementById("sound");

/* load */
fetch("games-db.json")
.then(x=>x.json())
.then(d=>{
if(db.length===0)db=d.games;
render();
});

/* save */
function save(){
localStorage.setItem("db",JSON.stringify(db));
}

/* theme FIX */
function setTheme(t){
document.body.className=t;
}

/* panel */
function toggle(){
let p=document.getElementById("panel");
p.style.display=p.style.display==="block"?"none":"block";
}

/* add */
function add(){
let n=document.getElementById("name").value;
let rr=document.getElementById("rarity").value;
if(!n)return;

db.push({name:n,rarity:rr});
save();
render();
}

/* render */
function render(){
r.innerHTML="";
db.forEach((g,i)=>{
let el=document.createElement("div");
el.className="card";
el.dataset.index=i;
el.innerHTML=`<div>${g.name}</div><div class="badge">${g.rarity}</div>`;
r.appendChild(el);
});
}

/* pick */
function pick(){
let pool=[];
db.forEach(g=>{
let w=1;
if(g.rarity==="обычная")w=6;
if(g.rarity==="хорошая")w=4;
if(g.rarity==="отличная")w=2;
if(g.rarity==="легендарная")w=0.5;
for(let i=0;i<w*10;i++)pool.push(g);
});
return pool[Math.floor(Math.random()*pool.length)];
}

/* 🎰 SPIN FIX + SPEED */
function spin(){

if(spinning || db.length===0)return;
spinning=true;

res.style.opacity=0;

sound.currentTime=0;
sound.play();

/* SPEED FROM UI */
let speed=document.getElementById("speed").value;
document.documentElement.style.setProperty("--speed",speed+"s");

r.style.transition="none";
r.style.transform="translateX(0px)";

setTimeout(()=>{

r.style.transition=`transform ${speed}s cubic-bezier(.05,.9,.1,1)`;

const cards=[...document.querySelectorAll(".card")];

const chosen=pick();
const index=db.findIndex(g=>g.name===chosen.name);
const target=cards[index];

const main=document.querySelector(".main");
const center=main.offsetWidth/2;

const offset=
target.offsetLeft +
target.offsetWidth/2 -
center;

r.style.transform=`translateX(-${offset}px)`;

setTimeout(()=>{

res.innerHTML=`🎮 ${chosen.name}<br>${chosen.rarity}`;
res.style.opacity=1;

sound.pause();
sound.currentTime=0;

spinning=false;

},speed*1000);

},40);

}

</script>

</body>
</html>
