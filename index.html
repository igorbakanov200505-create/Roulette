<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"content="width=device-width,initial-scale=1.0">
<title>РУЛЕТКА</title>

<link rel="stylesheet"href="style.css">
</head>

<body class="space">

<div class="title">РУЛЕТКА</div>

<button class="spin"onclick="spin()">SPIN</button>
<button class="settings"onclick="toggle()">⚙</button>

<div class="panel"id="panel">

<select id="theme"onchange="setTheme(this.value)">
<option value="space">SPACE</option>
<option value="neon">NEON</option>
<option value="dark">DARK</option>
</select>

<input id="speed"type="range"min="3"max="8"step="0.5"value="5">

<input id="gameName"placeholder="Игра">
<select id="rarity">
<option>обычная</option>
<option>хорошая</option>
<option>отличная</option>
<option>легендарная</option>
</select>

<button onclick="add()">Добавить игру</button>

</div>

<div class="main">
<div class="pointer"></div>
<div class="roulette"id="r"></div>
</div>

<div class="result"id="res"></div>

<audio id="sound"src="1.mp3"></audio>

<script>

let db=[];
let spinning=false;

const r=document.getElementById("r");
const res=document.getElementById("res");
const sound=document.getElementById("sound");

/* LOAD DB */
fetch("games-db.json")
.then(r=>r.json())
.then(d=>{
db=d.games;
render();
});

/* RENDER */
function render(){

r.innerHTML="";

let pool=[];
for(let i=0;i<18;i++) pool.push(...db);

pool.forEach(g=>{
let el=document.createElement("div");
el.className="card";
el.innerHTML=`${g.name}<br>${g.rarity}`;
r.appendChild(el);
});

}

/* ADD GAME */
function add(){
let n=document.getElementById("gameName").value;
let rr=document.getElementById("rarity").value;

db.push({name:n,rarity:rr});
render();
}

/* THEME */
function setTheme(t){
document.body.className=t;
}

/* PANEL */
function toggle(){
let p=document.getElementById("panel");
p.style.display=p.style.display==="block"?"none":"block";
}

/* PICK */
function pick(){
let pool=[];
db.forEach(g=>{
let w=1;
if(g.rarity==="обычная")w=6;
if(g.rarity==="хорошая")w=4;
if(g.rarity==="отличная")w=2;
if(g.rarity==="легендарная")w=0.6;

for(let i=0;i<w*10;i++)pool.push(g);
});
return pool[Math.floor(Math.random()*pool.length)];
}

/* SPIN FAST + LONG MOVE */
function spin(){

if(spinning)return;
spinning=true;

res.style.opacity=0;

sound.currentTime=0;
sound.play();

/* speed from UI */
let speed=document.getElementById("speed").value;
document.documentElement.style.setProperty("--speed",speed+"s");

/* reset */
r.style.transition="none";
r.style.transform="translateX(0px)";

setTimeout(()=>{

r.style.transition=`transform ${speed}s cubic-bezier(.05,.9,.1,1)`;

let cards=[...document.querySelectorAll(".card")];
let chosen=pick();

let el=cards.find(c=>c.innerText.includes(chosen.name));
if(!el) el=cards[0];

/* LONG SPIN BOOST (важно!) */
let baseOffset=
el.offsetLeft + el.offsetWidth/2
- window.innerWidth/2;

/* добавляем “докрутку” чтобы реально крутилось */
let extraSpin = 3000 + Math.random()*2000;

let offset = baseOffset + extraSpin;

r.style.transform=`translateX(-${offset}px)`;

setTimeout(()=>{

res.innerHTML=`🎮 ${chosen.name}<br>${chosen.rarity}`;
res.style.opacity=1;

sound.pause();
sound.currentTime=0;

spinning=false;

},speed*1000);

},50);

}

</script>

</body>
</html>
