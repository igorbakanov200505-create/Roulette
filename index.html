<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"content="width=device-width,initial-scale=1.0">
<title>РУЛЕТКА</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
color:#fff;
transition:0.6s;
}

/* THEMES */
body.space{background:radial-gradient(circle,#12002a,#000);}
body.neon{background:linear-gradient(120deg,#0f0f2d,#1a0033,#000);}
body.dark{background:#050505;}

/* TOP TITLE */
.title{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:22px;
font-weight:800;
letter-spacing:3px;
}

/* SPIN */
.spin{
position:absolute;
top:50px;
left:50%;
transform:translateX(-50%);
padding:14px 40px;
border:none;
border-radius:12px;
background:#7c3aed;
color:#fff;
cursor:pointer;
font-size:18px;
}

/* SETTINGS */
.settingsBtn{
position:absolute;
top:15px;
right:15px;
width:45px;
height:45px;
border-radius:10px;
border:none;
background:#7c3aed;
color:#fff;
cursor:pointer;
}

.panel{
position:absolute;
right:15px;
top:70px;
width:280px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(12px);
border-radius:14px;
padding:12px;
display:none;
}

.panel input,.panel select{
width:100%;
padding:8px;
margin-top:8px;
border:none;
border-radius:8px;
background:#111;
color:#fff;
}

.panel button{
width:100%;
margin-top:10px;
padding:8px;
border:none;
border-radius:8px;
background:#7c3aed;
color:#fff;
cursor:pointer;
}

/* MAIN */
.main{
position:absolute;
left:50%;
top:55%;
transform:translate(-50%,-50%);
width:1600px;
height:260px;
border-radius:22px;
background:rgba(255,255,255,.03);
backdrop-filter:blur(14px);
overflow:hidden;
}

.pointer{
position:absolute;
left:50%;
top:0;
transform:translateX(-50%);
width:4px;
height:100%;
background:#ff00ff;
box-shadow:0 0 20px #ff00ff;
}

.roulette{
display:flex;
gap:18px;
padding:45px;
transition:transform 10s cubic-bezier(.1,.85,.1,1);
}

.card{
min-width:340px;
height:170px;
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
}

/* RESULT */
.result{
position:absolute;
left:50%;
bottom:40px;
transform:translateX(-50%);
font-size:30px;
opacity:0;
transition:.3s;
text-align:center;
}

/* SOCIAL ICONS */
.social{
position:absolute;
bottom:15px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

.social a{
text-decoration:none;
color:#fff;
padding:10px 14px;
border-radius:10px;
background:rgba(0,0,0,.4);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
gap:8px;
}

/* ICON STYLE */
.icon{
width:18px;
height:18px;
}

</style>
</head>

<body class="space">

<div class="title">РУЛЕТКА</div>

<button class="spin"onclick="spin()">SPIN</button>
<button class="settingsBtn"onclick="toggle()">⚙</button>

<div class="panel"id="panel">

<input id="name"placeholder="Игра">
<select id="rarity">
<option>обычная</option>
<option>хорошая</option>
<option>отличная</option>
<option>легендарная</option>
</select>

<button onclick="add()">Добавить игру</button>

<hr>

<button onclick="theme('space')">SPACE</button>
<button onclick="theme('neon')">NEON</button>
<button onclick="theme('dark')">DARK</button>

</div>

<div class="main">
<div class="pointer"></div>
<div class="roulette"id="r"></div>
</div>

<div class="result"id="res"></div>

<!-- SOCIAL -->
<div class="social">

<a href="https://www.twitch.tv/azraellonelive"target="_blank">
<img class="icon"src="https://cdn-icons-png.flaticon.com/512/5968/5968819.png">
Twitch
</a>

<a href="https://www.youtube.com/@AzraelLone"target="_blank">
<img class="icon"src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
YouTube
</a>

</div>

<audio id="sound"src="1.mp3"></audio>

<script>

let games=JSON.parse(localStorage.getItem("games"))||[
{name:"Minecraft",rarity:"отличная"},
{name:"Elden Ring",rarity:"легендарная"},
{name:"GTA V",rarity:"отличная"}
];

const r=document.getElementById("r");
const res=document.getElementById("res");
const panel=document.getElementById("panel");
const sound=document.getElementById("sound");

let spinning=false;

/* RENDER */
function render(){
r.innerHTML="";
let pool=[];
for(let i=0;i<18;i++) pool.push(...games);

pool.forEach(g=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=`${g.name}<br>${g.rarity}`;
r.appendChild(d);
});
}
render();

/* ADD */
function add(){
let n=document.getElementById("name").value;
let rr=document.getElementById("rarity").value;
if(!n)return;

games.push({name:n,rarity:rr});
localStorage.setItem("games",JSON.stringify(games));
render();
}

/* PANEL */
function toggle(){
panel.style.display=panel.style.display==="block"?"none":"block";
}

/* THEME */
function theme(t){
document.body.className=t;
}

/* PICK */
function pick(){
let pool=[];
games.forEach(g=>{
let w=1;
if(g.rarity==="обычная")w=6;
if(g.rarity==="хорошая")w=4;
if(g.rarity==="отличная")w=2;
if(g.rarity==="легендарная")w=0.7;

for(let i=0;i<w*10;i++)pool.push(g);
});
return pool[Math.floor(Math.random()*pool.length)];
}

/* SPIN */
function spin(){

if(spinning)return;
spinning=true;

res.style.opacity=0;

sound.currentTime=0;
sound.play();

r.style.transition="none";
r.style.transform="translateX(0px)";

setTimeout(()=>{

r.style.transition="transform 10s cubic-bezier(.1,.85,.1,1)";

let cards=[...document.querySelectorAll(".card")];

let chosen=pick();

let el=cards.find(c=>c.innerText.includes(chosen.name));

let offset=
(el.offsetLeft + el.offsetWidth/2)
- window.innerWidth/2;

r.style.transform=`translateX(-${offset}px)`;

setTimeout(()=>{

res.innerHTML=`🎮 ${chosen.name}<br>${chosen.rarity}`;
res.style.opacity=1;

sound.pause();
sound.currentTime=0;

spinning=false;

},10000);

},50);

}

</script>

</body>
</html>
