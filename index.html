<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"content="width=device-width,initial-scale=1.0">
<title>РУЛЕТКА</title>

<link rel="stylesheet"href="style.css">
</head>

<body class="space">

<div class="title">РУЛЕТКА</div>

<button class="spin"onclick="spin()">SPIN</button>
<button class="settings"onclick="toggle()">⚙</button>

<div class="panel"id="panel">

<select onchange="theme(this.value)">
<option value="space">SPACE</option>
<option value="neon">NEON</option>
<option value="dark">DARK</option>
</select>

<input id="name"placeholder="Игра">
<select id="rarity">
<option>обычная</option>
<option>хорошая</option>
<option>отличная</option>
<option>легендарная</option>
</select>

<select id="level">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
</select>

<button onclick="add()">Добавить</button>

</div>

<div class="main">
<div class="pointer"></div>
<div class="roulette"id="r"></div>
</div>

<div class="result"id="res"></div>

<audio id="sound"src="1.mp3"></audio>

<script>

let db=[];
let spinning=false;

const r=document.getElementById("r");
const res=document.getElementById("res");
const sound=document.getElementById("sound");

/* LOAD DB */
fetch("games-db.json")
.then(r=>r.json())
.then(d=>{
db=d.games;
render();
});

/* RENDER */
function render(){
r.innerHTML="";

let pool=[];
for(let i=0;i<18;i++) pool.push(...db);

pool.forEach(g=>{
let el=document.createElement("div");
el.className="card";
el.innerHTML=`
<div>${g.name}</div>
<div class="badge">⭐ ${g.rarity} | LVL ${g.level}</div>
`;
r.appendChild(el);
});
}

/* ADD */
function add(){
let n=document.getElementById("name").value;
let rr=document.getElementById("rarity").value;
let lv=document.getElementById("level").value;

if(!n)return;

db.push({name:n,rarity:rr,level:lv});
render();
}

/* THEME FIXED */
function theme(t){
document.body.className="";
document.body.classList.add(t);
}

/* PICK */
function pick(){
let pool=[];

db.forEach(g=>{
let w=1;

if(g.rarity==="обычная")w=6;
if(g.rarity==="хорошая")w=4;
if(g.rarity==="отличная")w=2;
if(g.rarity==="легендарная")w=0.6;

for(let i=0;i<w*10;i++)pool.push(g);
});

return pool[Math.floor(Math.random()*pool.length)];
}

/* 🔥 FIXED SPIN */
function spin(){

if(spinning)return;
spinning=true;

res.style.opacity=0;

sound.currentTime=0;
sound.play();

/* reset */
r.style.transition="none";
r.style.transform="translateX(0px)";

setTimeout(()=>{

r.style.transition="transform 4.8s cubic-bezier(.05,.9,.1,1)";

let cards=[...document.querySelectorAll(".card")];
let chosen=pick();

let el=cards.find(c=>c.innerText.includes(chosen.name));
if(!el) el=cards[0];

/* ✔ SAFE CENTER (без window bug) */
const main=document.querySelector(".main");
const center=main.offsetWidth/2;

const offset=
el.offsetLeft + el.offsetWidth/2 - center;

/* небольшая живость */
const jitter=(Math.random()*30-15);

r.style.transform=`translateX(-${offset+jitter}px)`;

setTimeout(()=>{

res.innerHTML=
`🎮 ${chosen.name}<br>⭐ ${chosen.rarity} | LVL ${chosen.level}`;

res.style.opacity=1;

sound.pause();
sound.currentTime=0;

spinning=false;

},4800);

},40);

}

</script>

</body>
</html>
